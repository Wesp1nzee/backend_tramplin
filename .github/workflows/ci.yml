name: CI (Lint & Test)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      test_db:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_tramplin
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d test_tramplin"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 5

      test_redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-extras --dev --frozen

      - name: Run pre-commit hooks
        run: |
          uv run pre-commit install
          uv run pre-commit run --all-files --show-diff-on-failure

      - name: Run Security Checks (Bandit + pip-audit)
        run: |
          uv run bandit -r src/ --skip B105,B106 -q
          uv run pip-audit --ignore-vuln GHSA-5239-wwwm-4pmq

      - name: Run Pytest
        env:
          ENVIRONMENT: test
          DEBUG: "False"
          ENABLE_DOCS: "False"
          ENABLE_RATE_LIMITING: "False"

          SECRET_KEY: test_secret_key_2026_secure_minimum_32_bytes!!!
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "15"
          REFRESH_TOKEN_EXPIRE_MINUTES: "10080"
          DEFAULT_ADMIN_EMAIL: admin@tramplin.ru
          DEFAULT_ADMIN_PASSWORD: ChangeMeInProduction123!

          POSTGRES_SERVER: localhost
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_tramplin
          POSTGRES_PORT: "5433"

          DADATA_API_KEY: test_api_key
          DADATA_SECRET_KEY: test_secret_key

          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5433/test_tramplin?ssl=disable

          REDIS_URL: redis://localhost:6379/0

          CORS_ORIGINS: "http://localhost:3000"

        run: uv run pytest -v -s tests/ --tb=short

      - name: Upload test results (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: |
            .pytest_cache/
            *.log
          retention-days: 3
