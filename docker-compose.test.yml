services:
  test_db:
    image: postgis/postgis:18-3.6
    container_name: tramplin_test_db
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_tramplin
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_tramplin"]
      interval: 3s
      timeout: 3s
      retries: 5

  test_redis:
    image: redis:7-alpine
    container_name: tramplin_test_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5
